name: Health Check

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */12 * * *'

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Start Container
        run: |
          docker run -d -p 5000:5000 \
          --name health-app \
          ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Wait
        run: sleep 5

      - name: Check Health
        run: |
          curl http://localhost:5000/health

      - name: Cleanup
        if: always()
        run: |
          docker stop health-app
          docker rm health-app

      - name: Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: github-actions-capstone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
